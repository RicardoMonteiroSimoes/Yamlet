system: notification-service
topic: Notification service
summary: Delivers notifications to a user over a channel
description: >-
  Accepts a notification and delivers it to a user over the requested channel.
blast_radius: medium
front: external
exposes:
  name: notification-service
  intent: deliver a notification to a user over a channel
  inputs:
  - user_id
  - channel
  - never_used

requirements:
- id: RQ-1
  description: Notifications are delivered over the requested channel
  acceptance-criteria:
  - id: AC-1
    pattern: event
    when: a notification is requested for {input.user_id} over {input.channel}
    shall:
    - deliver the notification to the user
