name: Release

# Release flow: create a Release from the GitHub UI (which creates the tag).
# Publishing it triggers this workflow, which cross-compiles the four binaries,
# attaches the tarballs + checksums to that same Release, and pushes an updated
# formula to the Homebrew tap. The Release is the trigger, not something this
# workflow creates — so it never fights an already-existing release.
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.2"

      - name: Resolve version
        id: version
        # The tag reaches the shell only through env, never spliced into the
        # script via ${{ }} (which would be a shell-injection vector). The regex
        # is a strict semver allow-list, so the value passed to later steps is
        # constrained to [0-9A-Za-z.-]. The raw tag (with its leading v) is what
        # we upload assets against; VERSION (no v) is what the scripts expect.
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          v="${TAG#v}"
          if ! printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::release tag must be semver like v1.2.3 or v1.2.3-rc.1 (got '$TAG')"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $v)"

      - name: Build all targets
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # Invoked via `sh` (not ./) so the pipeline never depends on the script
        # carrying an execute bit in git.
        run: sh scripts/build-release.sh "$VERSION"

      - name: Attach artifacts to the Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        # --clobber so a re-run of a failed build overwrites any partial uploads
        # instead of erroring on assets that are already there.
        run: |
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            dist/yamlet-"$VERSION"-*.tar.gz dist/SHA256SUMS

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: sh scripts/update-tap.sh "$VERSION"
