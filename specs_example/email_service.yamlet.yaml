system: e-mail-sending-service
topic: E-Mail sending service
summary: A generic e-mail sending service that exposes a contract for others to send emails with a given content
description: >-
  The generic e-mail sending service offers connectivity to a single TLS SMTP server, and can then be used by the platform to send out any kind of emails required.
blast_radius: high
front: internal
exposes:
  name: e-mail-sending-service
  intent: send an email with a subject and content to a recipient over TLS SMTP
  inputs:
  - recipient
  - subject
  - content
  - attachment

requirements:
- id: RQ-1
  description: >-
    The service reliably connects to a single SMTP service
  acceptance-criteria:
  - id: AC-1
    pattern: event
    when: a login is attempted using valid TLS SMTP credentials
    shall:
    - authenticate to the SMTP server over TLS
  - id: AC-2
    pattern: complex
    while:
    - the service is authenticated at the SMTP server
    - an e-mail send is in progress
    if: an SMTP timeout occurs
    shall:
    - re-authenticate to the SMTP server
    - resend the previously failed e-mail
    - ensure no e-mail is dropped in the process
  - id: AC-3
    pattern: complex
    while:
    - "{n} retries have already been attempted for the e-mail"
    if: an SMTP timeout occurs on the re-authentication attempt
    shall:
    - a retry is scheduled with {delay_seconds} seconds backoff delay
    examples:
    - n: 0
      delay_seconds: 10
    - n: 1
      delay_seconds: 30
- id: RQ-2
  description: >-
    The service sends a well-formed email on request
  acceptance-criteria:
  - id: AC-4
    pattern: event
    when: a send is requested for {input.recipient}
    shall:
    - compose an email addressed to {input.recipient}
    - set the email subject to {input.subject}
    - set the email body to {input.content}
    - attach {input.attachment} to the email
    - hand the email to the SMTP server for delivery
